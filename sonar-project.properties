sonar.projectKey=DenisZhutaev_qa-auto-engineer-python-project-314
sonar.organization=deniszhutaev

# This repository contains Python Selenium tests.
sonar.sources=tests
sonar.python.version=3.12

# GitHub Actions cannot run these UI tests without the application and browser
# stack. Without a Cobertura report, Sonar reports 0% coverage and fails the
# default coverage gate. Excluding sources from the coverage metric matches
# a test-only automation repo (issues are still analyzed). Generate
# coverage.xml locally with: make coverage-xml
sonar.coverage.exclusions=**/*.py
