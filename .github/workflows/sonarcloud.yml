name: SonarCloud

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Start application
        run: |
          # Best-effort startup for projects that expose `make start`.
          # E2E Selenium tests require a running app.
          make start > app.log 2>&1 &
          sleep 25

      - name: Generate coverage.xml
        env:
          APP_BASE_URL: http://localhost:5173
        run: |
          make coverage-xml
          test -f coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=DenisZhutaev_qa-auto-engineer-python-project-314
            -Dsonar.organization=deniszhutaev
            -Dsonar.sources=tests/support
            -Dsonar.tests=tests
            -Dsonar.python.version=3.12
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
